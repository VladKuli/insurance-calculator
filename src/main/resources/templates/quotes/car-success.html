<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quote Accepted</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, Arial, sans-serif;
            background:
                    radial-gradient(circle at top left, rgba(34, 197, 94, 0.22), transparent 35%),
                    linear-gradient(135deg, #071426 0%, #0b1f3a 45%, #102a4c 100%);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .success-card {
            width: 100%;
            max-width: 620px;
            text-align: center;
            background: rgba(8, 24, 48, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 28px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(16px);
            padding: 44px 36px;
        }

        .success-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            margin: 0 auto 22px;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 32px;
        }

        p {
            margin: 0;
            color: #cbd5e1;
            font-size: 17px;
            line-height: 1.6;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            border-radius: 14px;
            padding: 13px 28px;
            background: linear-gradient(135deg, #2563eb, #38bdf8);
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            box-shadow: 0 14px 30px rgba(37, 99, 235, 0.35);
        }
    </style>
</head>

<body>
<div class="success-card">
    <div class="success-icon">✓</div>

    <h1>Quote accepted</h1>

    <p>
        Thank you! Our employee will contact you in the near future
        to continue with your car insurance request.
    </p>

    <a class="back-link" th:href="@{/}">
        Back to home
    </a>
</div>
</body>
</html>
