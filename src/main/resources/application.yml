spring:
  application:
    name: insurance-quote-calculator

  datasource:
    url: jdbc:postgresql://localhost:5432/insurance_calculator
    username: insurance_admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration